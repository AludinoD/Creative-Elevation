<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Booking Page -->
    <title>Book Now | Creative Elevation</title>
    <!-- Seperated 2 CSS Files, Main for global styles(Nav, Footer, Hero, and any global styles) While the Other CSS is for Page Specific Styles. -->
    <link rel="stylesheet" href="/main.css" />
    <link rel="stylesheet" href="../css/booking.css" />
    <!-- Font Icons CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" type="image/x-icon" href="../imgs/favicon.ico" />
  </head>
  <!-- Main Body -->
  <body class="fit-screen booking-reference">
    <!-- Navigation Bar With 5 Links, and Clickable Logo. -->
    <header>
      <nav class="main-nav">
        <a href="../index.html" class="logo">Creative Elevation</a>
        <button class="nav-toggle" aria-label="Open navigation">
          <span class="fas fa-bars"></span>
        </button>
        <div class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../pages/about.html">About</a>
          <a href="../pages/services.html">Services</a>
          <a href="../pages/gallery.html">Gallery</a>
          <a href="../pages/booking.html" aria-current="page">Book Now</a>
        </div>
      </nav>
    </header>
    <!-- Booking Hero Section -->
    <main>
      <section class="booking-hero">
        <div class="hero-content">
          <h1>Secure Your Space</h1>
          <p>Select your preferred time that works for your vision.</p>
        </div>
      </section>

      <!-- Booking Container for the Calendly Widget API -->
      <!-- This is an automated API that allows user to book the venue and Informs the Host -->
      <section class="booking-container" aria-label="Booking Calendar">
        <div
          class="calendly-inline-widget"
          data-url="https://calendly.com/blankframedigital/booking-calendar-creative-elevation?hide_event_type_details=1&hide_gdpr_banner=1&background_color=1a1a1a&text_color=f5f5f5&primary_color=d6ad60"
          style="min-width: 320px; height: 700px"
        ></div>
        <script
          type="text/javascript"
          src="https://assets.calendly.com/assets/external/widget.js"
          async
        ></script>
      </section>
    </main>

    <!-- Footer with Important Nav Bar Links and Socials -->
    <footer>
      <div class="footer-container">
        <div class="footer-social">
          <a
            href="https://www.instagram.com/creative.elevation2025"
            target="_blank"
            aria-label="Instagram"
            ><i class="fab fa-instagram"></i
          ></a>
          <a
            href="https://www.facebook.com/profile.php?id=61574443273442"
            target="_blank"
            aria-label="Facebook"
            ><i class="fab fa-facebook-f"></i
          ></a>
          <a href="#" aria-label="LinkedIn"
            ><i class="fab fa-linkedin-in"></i
          ></a>
          <a
            href="https://www.tiktok.com/@creativeelevation_events?_r=1&_t=ZS-95kRLZ7fLkK"
            target="_blank"
            aria-label="TikTok"
            ><i class="fab fa-tiktok"></i
          ></a>
        </div>
        <div class="footer-links">
          <a href="../index.html">Home</a>
          <a href="../pages/about.html">About</a>
          <a href="../pages/services.html">Services</a>
          <a href="../pages/gallery.html">Gallery</a>
          <a href="../pages/booking.html">Book Now</a>
        </div>
      </div>
      <div class="footer-copyright">
        <p>&copy; 2025 Creative Elevation. All rights reserved.</p>
      </div>
    </footer>

    <!-- Back-to-top button -->
    <button id="scrollTopBtn" aria-label="Scroll to top">
      <i class="fas fa-chevron-up"></i>
    </button>

    <!-- In Built Java Script For Responsiveness and Animations -->
    <script>
      /* Mobile menu toggle:
       switches .show so nav links are visible on small screens. */
      // Opens/closes the mobile menu
      const navToggle = document.querySelector(".nav-toggle");
      const navLinks = document.querySelector(".nav-links");
      navToggle.addEventListener("click", () => {
        navLinks.classList.toggle("show");
        navToggle.classList.toggle("active");
      });
      /* Fade-in controller:
       applies .animate only when sections enter viewport. */
      // Adds fade-in class when sections enter view
      document.addEventListener("DOMContentLoaded", function () {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("animate");
              }
            });
          },
          { threshold: 0.1 },
        );
        document.querySelectorAll("section").forEach((section) => {
          observer.observe(section);
        });
      });

      /* Back to Top Button Logic  */
      const scrollTopBtn = document.getElementById("scrollTopBtn");

      // 1. Monitor scroll position to show/hide the button
      window.onscroll = function () {
        // Show button after scrolling down 300px
        if (
          document.body.scrollTop > 300 ||
          document.documentElement.scrollTop > 300
        ) {
          scrollTopBtn.style.display = "block";
        } else {
          scrollTopBtn.style.display = "none";
        }
      };

      // Add click event to scroll back to the top
      scrollTopBtn.onclick = function () {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      };
    </script>
  </body>
</html>
